name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch PokeAPI CSV data
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PokeAPI/pokeapi.git _pokeapi_tmp
          cd _pokeapi_tmp && git sparse-checkout set data/v2/csv && cd ..
          mkdir -p data/v2
          cp -r _pokeapi_tmp/data/v2/csv data/v2/
          rm -rf _pokeapi_tmp

      - name: Build data
        run: node scripts/build-data.js

      - name: Download full-size sprites
        run: |
          mkdir -p public/images/full
          echo "Downloading 1025 full-size sprites..."
          seq 1 1025 | xargs -P 20 -I {} sh -c '
            if [ ! -f public/images/full/{}.png ]; then
              curl -sL --retry 3 --retry-delay 1 -o public/images/full/{}.png \
                "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/{}.png" || echo "FAILED: {}"
            fi
          '
          echo "Downloaded $(ls public/images/full/*.png 2>/dev/null | wc -l) sprites"

      - name: Build app
        run: npm run build

      - name: Copy static assets
        run: |
          cp public/sw.js dist/
          cp public/manifest.json dist/
          cp -r public/icons dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
